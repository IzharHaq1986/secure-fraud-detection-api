name: Publish container image to GHCR

on:
  push:
    # Publish only when a version tag is pushed.
    # Example tags: v1.0.6, v1.2.0, v2.0.0
    tags:
      - "v*"

permissions:
  # Read repository contents for Docker build context.
  contents: read

  # Push container images to GitHub Container Registry (GHCR).
  packages: write

  # Required for Cosign keyless signing via GitHub Actions OIDC.
  id-token: write

concurrency:
  # Prevent parallel publish runs for the same tag.
  group: ghcr-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build, sign, and publish image
    runs-on: ubuntu-latest

    steps:
      # Checkout repository content to access Dockerfile and source code.
      - name: Checkout
        uses: actions/checkout@v4

      # Enable Buildx for modern build features (cache, future multi-platform support).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GitHub Container Registry (GHCR).
      # GITHUB_TOKEN is sufficient when packages: write permission is enabled.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Normalize image name:
      # - GHCR requires lowercase.
      # - Repository owner is used as the namespace.
      - name: Prepare image metadata
        id: meta
        run: |
          set -euo pipefail

          IMAGE_OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="secure-fraud-detection-api"
          VERSION_TAG="${GITHUB_REF_NAME}"

          echo "image=ghcr.io/${IMAGE_OWNER}/${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION_TAG}" >> "${GITHUB_OUTPUT}"

      # Build and push:
      # - Two tags: immutable version tag + convenience latest tag
      # - GitHub Actions cache speeds up repeat builds
      - name: Build and push (version + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Install Cosign for keyless signing via GitHub Actions OIDC.
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Sign the immutable release image tag.
      # Keyless signing uses GitHub OIDC identity, no private keys stored.
      - name: Sign image (Cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail

          IMAGE_REF="${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          cosign sign "${IMAGE_REF}"

      # Generate an SBOM (Software Bill of Materials) for the published release image.
      # SPDX JSON is widely accepted and works well with many security tools.
      - name: Install Syft (SBOM generator)
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      # Create the SBOM from the pushed image tag (immutable release tag).
      # This guarantees SBOM matches the shipped artifact.
      - name: Generate SBOM (SPDX JSON)
        run: |
          set -euo pipefail

          IMAGE_REF="${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          syft "${IMAGE_REF}" -o spdx-json > sbom.spdx.json

      # Upload SBOM so it is available for review and audit on every release publish run.
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json
          if-no-files-found: error

      # Helpful output in workflow logs for quick verification.
      - name: Print published image references
        run: |
          set -euo pipefail
          echo "Published:"
          echo "  ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"
          echo "  ${{ steps.meta.outputs.image }}:latest"
