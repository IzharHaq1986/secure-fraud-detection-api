name: Publish container image to GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish (example: v1.0.8). If empty, uses the Git ref name."
        required: false
        default: ""

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    name: Build, push, sign, and enforce verification
    runs-on: ubuntu-latest

    env:
      IMAGE_REPO: ghcr.io/izharhaq1986/secure-fraud-detection-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          # For workflow_dispatch, allow an explicit tag. Otherwise use the pushed git tag.
          if [ -n "${{ inputs.image_tag }}" ]
          then
            IMAGE_TAG="${{ inputs.image_tag }}"
          else
            IMAGE_TAG="${{ github.ref_name }}"
          fi

          if [ -z "${IMAGE_TAG}" ]
          then
            echo "IMAGE_TAG is empty"
            exit 1
          fi

          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Publishing ${IMAGE_REPO}:${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.image_tag }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Uses GitHub Actions cache for faster rebuilds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0.16.0

      - name: Generate SBOM (SPDX JSON) for pushed digest
        shell: bash
        run: |
          set -euo pipefail

          DIGEST="${{ steps.build.outputs.digest }}"
          if [ -z "${DIGEST}" ]
          then
            echo "Missing build digest output"
            exit 1
          fi

          IMAGE_DIGEST_REF="${IMAGE_REPO}@${DIGEST}"
          echo "Generating SBOM for ${IMAGE_DIGEST_REF}"

          syft "${IMAGE_DIGEST_REF}" -o spdx-json=sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx-json
          path: sbom.spdx.json
          if-no-files-found: error

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.2.4"

      - name: Cosign sign (keyless, by digest)
        shell: bash
        run: |
          set -euo pipefail

          DIGEST="${{ steps.build.outputs.digest }}"
          if [ -z "${DIGEST}" ]
          then
            echo "Missing build digest output"
            exit 1
          fi

          IMAGE_DIGEST_REF="${IMAGE_REPO}@${DIGEST}"
          echo "Signing ${IMAGE_DIGEST_REF}"

          cosign sign --yes "${IMAGE_DIGEST_REF}"

      - name: Enforce signature verification (keyless, by digest)
        shell: bash
        run: |
          set -euo pipefail

          DIGEST="${{ steps.build.outputs.digest }}"
          if [ -z "${DIGEST}" ]
          then
            echo "Missing build digest output"
            exit 1
          fi

          IMAGE_DIGEST_REF="${IMAGE_REPO}@${DIGEST}"
          echo "Verifying ${IMAGE_DIGEST_REF}"

          # Blocks the workflow if signature verification fails.
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/IzharHaq1986/secure-fraud-detection-api/.+" \
            "${IMAGE_DIGEST_REF}"

      - name: Create GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          immutable: false
          tag_name: ${{ steps.tag.outputs.image_tag }}
          files: |
            sbom.spdx.json
