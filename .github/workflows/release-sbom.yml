name: release-sbom

on:
  # Run automatically when a GitHub Release is published.
  release:
    types:
      - published

  # Allow manual runs (useful for backfills or validation).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to generate SBOM for (example: v1.0.30)"
        required: true
        type: string

permissions:
  # Required to upload workflow artifacts and (when enabled) interact with releases.
  contents: write

  # Required to pull container images from GHCR using GITHUB_TOKEN.
  packages: read

  # Read access to Actions metadata.
  actions: read

concurrency:
  # Prevent overlapping SBOM generations for the same ref.
  group: release-sbom-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sbom:
    name: Generate and upload SBOM
    runs-on: ubuntu-24.04

    steps:
      # Notes:
      # - checkout is not required for image SBOM generation, but it is kept to
      #   allow future enhancements (e.g., embedding repo metadata in SBOM notes).
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve tag and image reference
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          # Resolve the release tag:
          # - For release events: github.event.release.tag_name is authoritative
          # - For manual dispatch: inputs.tag is required
          TAG_FROM_RELEASE="${{ github.event.release.tag_name }}"
          TAG_FROM_INPUT="${{ inputs.tag }}"

          if [ -n "${TAG_FROM_INPUT}" ]; then
            TAG="${TAG_FROM_INPUT}"
          else
            TAG="${TAG_FROM_RELEASE}"
          fi

          if [ -z "${TAG}" ]; then
            echo "Tag could not be resolved. Provide inputs.tag or run from a release event."
            exit 1
          fi

          # GHCR image reference must be lowercase to satisfy OCI parsing rules.
          # github.repository is "Owner/Repo" and may include uppercase in the owner.
          REPO_LOWER="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"

          IMAGE_REPO="ghcr.io/${REPO_LOWER}"
          IMAGE_REF="${IMAGE_REPO}:${TAG}"

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

          echo "Resolved tag: ${TAG}"
          echo "Resolved image: ${IMAGE_REF}"

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          # Generate SBOM directly from the published GHCR image tag.
          image: ${{ steps.meta.outputs.image_ref }}

          # Output format.
          format: spdx-json

          # Consistent SBOM filename for workflow artifacts.
          output-file: sbom.spdx.json

          # Keep workflow artifacts enabled so SBOMs are still published in CI output.
          upload-artifact: true

          # Releases are immutable in this repository, so attaching assets will always fail.
          # Upload SBOM to the workflow run artifacts instead of GitHub Release assets.
          upload-release-assets: false
