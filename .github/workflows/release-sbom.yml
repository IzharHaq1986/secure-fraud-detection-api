name: Release SBOM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  release_sbom:
    name: Attach SBOM to GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create SBOM (SPDX JSON) from container image digest
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          IMAGE_REPO: ghcr.io/izharhaq1986/secure-fraud-detection-api
          # Uses the workflow token to authenticate GHCR manifest requests (required for private packages).
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # The workflow is tag-triggered; use the tag name as the release identifier.
          if [ -z "${TAG:-}" ]
          then
            echo "Tag is empty"
            exit 1
          fi

          # Resolve the immutable image digest from the tag (OCI/Docker Registry HTTP API v2).
          # This request is authenticated because GHCR may not expose digest headers for private images.
          REPO_PATH="${IMAGE_REPO#ghcr.io/}"
          MANIFEST_URL="https://ghcr.io/v2/${REPO_PATH}/manifests/${TAG}"

          DIGEST="$(curl -sSI \
            -H "Authorization: Bearer ${GHCR_TOKEN}" \
            -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            "${MANIFEST_URL}" \
            | awk -F': ' 'tolower($1)=="docker-content-digest"{print $2}' \
            | tr -d '\r')"

          if [ -z "${DIGEST}" ]
          then
            echo "Failed to resolve digest for ${IMAGE_REPO}:${TAG}"
            echo "Tried: ${MANIFEST_URL}"
            exit 1
          fi

          IMAGE_DIGEST_REF="${IMAGE_REPO}@${DIGEST}"
          echo "Generating SBOM for ${IMAGE_DIGEST_REF}"

          # Install Syft and generate an SPDX JSON SBOM.
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

          syft "${IMAGE_DIGEST_REF}" -o spdx-json=sbom.spdx.json

      - name: Create GitHub Release if missing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${TAG:-}" ]
          then
            echo "Tag is empty"
            exit 1
          fi

          # Create a standard (mutable) release if it does not exist yet.
          if ! gh release view "${TAG}" >/dev/null 2>&1
          then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "Automated release for ${TAG}"
          fi

      - name: Upload SBOM to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${TAG:-}" ]
          then
            echo "Tag is empty"
            exit 1
          fi

          if [ ! -f "sbom.spdx.json" ]
          then
            echo "SBOM file not found: sbom.spdx.json"
            exit 1
          fi

          # Upload the SBOM asset. Overwrite if the asset already exists.
          gh release upload "${TAG}" "sbom.spdx.json" --clobber
