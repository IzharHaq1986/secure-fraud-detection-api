name: Release SBOM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release_sbom:
    name: Attach SBOM to GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM (SPDX JSON)
        shell: bash
        run: |
          set -euo pipefail

          # Use the tag name as the release identifier.
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "${TAG}" ]
          then
            echo "Tag is empty"
            exit 1
          fi

          # The SBOM is generated from the repository source for this tag.
          # This avoids any coupling to container publishing and remains deterministic.
          echo "Generating SBOM for ${TAG}"

          python -m pip install --upgrade pip
          python -m pip install "cyclonedx-bom>=4.0.0"

          # Generate an SPDX JSON SBOM for the Python project dependencies.
          # The output file name matches the release asset name used elsewhere.
          cyclonedx-py -o sbom.spdx.json

      - name: Create GitHub Release if missing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "${TAG}" ]
          then
            echo "Tag is empty"
            exit 1
          fi

          # Create a standard (mutable) release if it does not exist yet.
          if ! gh release view "${TAG}" >/dev/null 2>&1
          then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "Automated release for ${TAG}"
          fi

      - name: Upload SBOM to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "${TAG}" ]
          then
            echo "Tag is empty"
            exit 1
          fi

          if [ ! -f "sbom.spdx.json" ]
          then
            echo "SBOM file not found: sbom.spdx.json"
            exit 1
          fi

          # Upload the SBOM asset. Overwrite if the asset already exists.
          gh release upload "${TAG}" "sbom.spdx.json" --clobber
