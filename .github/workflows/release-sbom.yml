name: Release SBOM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  release_sbom:
    name: Attach SBOM to GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR (for private manifest access)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.3

      - name: Create SBOM (SPDX JSON) from container image digest
        shell: bash
        env:
          IMAGE_REPO: ghcr.io/izharhaq1986/secure-fraud-detection-api
        run: |
          set -euo pipefail

          # Resolve tag name safely under strict mode.
          TAG="${TAG:-${GITHUB_REF_NAME:-}}"
          if [ -z "${TAG}" ]
          then
            echo "Tag is empty"
            exit 1
          fi

          # Resolve the immutable digest using an authenticated registry client.
          # This avoids relying on response headers that may not be present for private images.
          IMAGE_REF="${IMAGE_REPO}:${TAG}"
          echo "Resolving digest for ${IMAGE_REF}"

          DIGEST="$(crane digest "${IMAGE_REF}")"
          if [ -z "${DIGEST}" ]
          then
            echo "Failed to resolve digest for ${IMAGE_REF}"
            exit 1
          fi

          IMAGE_DIGEST_REF="${IMAGE_REPO}@${DIGEST}"
          echo "Generating SBOM for ${IMAGE_DIGEST_REF}"

          # Install Syft and generate an SPDX JSON SBOM.
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

          syft "${IMAGE_DIGEST_REF}" -o spdx-json=sbom.spdx.json

      - name: Create GitHub Release if missing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Resolve tag name safely under strict mode.
          TAG="${TAG:-${GITHUB_REF_NAME:-}}"
          if [ -z "${TAG}" ]
          then
            echo "Tag is empty"
            exit 1
          fi

          # Create a standard (mutable) release if it does not exist yet.
          if ! gh release view "${TAG}" >/dev/null 2>&1
          then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "Automated release for ${TAG}"
          fi

      - name: Upload SBOM to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Resolve tag name safely under strict mode.
          TAG="${TAG:-${GITHUB_REF_NAME:-}}"
          if [ -z "${TAG}" ]
          then
            echo "Tag is empty"
            exit 1
          fi

          if [ ! -f "sbom.spdx.json" ]
          then
            echo "SBOM file not found: sbom.spdx.json"
            exit 1
          fi

          # Upload the SBOM asset. Overwrite if the asset already exists.
          gh release upload "${TAG}" "sbom.spdx.json" --clobber
