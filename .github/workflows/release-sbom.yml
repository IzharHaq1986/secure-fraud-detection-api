name: release-sbom

on:
  # Generate and attach an SBOM whenever a GitHub Release is published.
  release:
    types: [published]

  # Manual run support (useful for re-generating SBOM for a specific tag).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to generate SBOM for (example: v1.0.25). Leave empty to use the release event tag."
        required: false
        default: ""

permissions:
  contents: write   # Required to upload release assets via gh
  packages: read    # Required to pull images from GHCR
  actions: read

jobs:
  sbom:
    name: Generate and upload SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag and image reference
        id: refs
        shell: bash
        run: |
          set -euo pipefail

          # Resolve the release tag:
          # - For release events: github.event.release.tag_name is authoritative
          # - For manual dispatch: inputs.tag can be provided
          TAG_FROM_RELEASE="${{ github.event.release.tag_name }}"
          TAG_FROM_INPUT="${{ inputs.tag }}"

          if [ -n "${TAG_FROM_INPUT}" ]; then
            TAG="${TAG_FROM_INPUT}"
          else
            TAG="${TAG_FROM_RELEASE}"
          fi

          if [ -z "${TAG}" ]; then
            echo "Tag could not be resolved. Provide inputs.tag or run from a release event."
            exit 1
          fi

          # GHCR image reference for this repository.
          # Example: ghcr.io/owner/repo:v1.0.25
         # Normalize repository name to lowercase for OCI compatibility
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          IMAGE_REPO="ghcr.io/${REPO_LOWER}"
          IMAGE_REF="${IMAGE_REPO}:${TAG}"

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

          echo "Resolved tag: ${TAG}"
          echo "Resolved image: ${IMAGE_REF}"

      - name: Authenticate to GHCR
        # Pulling the image to generate an SBOM can require authentication even for some public scenarios.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM (SPDX JSON)
        # Syft-based SBOM generation for the container image reference.
        # Output is stored as a deterministic file name for easy release attachment.
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.refs.outputs.image_ref }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM to GitHub Release (skip if immutable)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.refs.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          SBOM_FILE="sbom.spdx.json"

          if [ ! -f "${SBOM_FILE}" ]; then
            echo "SBOM file not found (${SBOM_FILE}); skipping upload."
            exit 0
          fi

          echo "Attempting to upload SBOM asset to release: ${TAG}"
          echo "Repository: ${REPO}"
          echo "Asset: ${SBOM_FILE}"

          # Capture BOTH stdout and stderr because gh may print HTTP 422 to stdout.
          UPLOAD_LOG="$(mktemp)"

          if gh release upload "${TAG}" "${SBOM_FILE}" --clobber --repo "${REPO}" > "${UPLOAD_LOG}" 2>&1; then
            echo "SBOM uploaded successfully."
            exit 0
          fi

          # Always print the captured output to keep CI logs actionable.
          echo "gh release upload failed. Raw output:"
          cat "${UPLOAD_LOG}"

          # GitHub returns HTTP 422 when uploads are blocked due to release immutability.
          # The exact wording varies, so match multiple known patterns while keeping scope tight.
          if grep -q "HTTP 422" "${UPLOAD_LOG}" && \
             ( grep -qi "immutable" "${UPLOAD_LOG}" || grep -qi "Cannot upload assets" "${UPLOAD_LOG}" ); then
            echo "Detected immutable release upload rejection (HTTP 422). Skipping SBOM upload without failing CI."
            exit 0
          fi

          # Fail closed for all other errors.
          echo "SBOM upload failed for a reason other than immutable release protection."
          exit 1
