name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Keep permissions explicit.
# - contents:read is enough for checkout
# - security-events:write is required to upload SARIF results
permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Unit tests + coverage gate
    runs-on: ubuntu-latest

    steps:
      # Checkout repository content for the workflow run
      - name: Checkout
        uses: actions/checkout@v4

      # Install the Python version used by the project
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip downloads to speed up subsequent runs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install dependencies required for tests
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install dev/test dependencies if a separate file exists
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      # Run tests with coverage and enforce the minimum threshold
      - name: Run pytest with coverage gate
        run: |
          pytest \
            --maxfail=1 \
            --disable-warnings \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=85

  vuln_scan:
    name: Container vulnerability scan (Trivy)
    runs-on: ubuntu-latest

    # Run only after the test job succeeds
    needs:
      - test

    steps:
      # Checkout repository content for the Docker build context
      - name: Checkout
        uses: actions/checkout@v4

      # Build the container image exactly as used in deployment
      - name: Build Docker image
        run: |
          docker build -t secure-fraud-detection-api:ci .

      # Generate a SARIF report for GitHub Security (HIGH/CRITICAL)
      - name: Trivy scan (SARIF export)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secure-fraud-detection-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      # Upload SARIF so findings appear under Security → Code scanning alerts
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # Fail the build if CRITICAL vulnerabilities are detected
      # - ignore-unfixed:true avoids failing on issues without an available fix
      - name: Fail on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secure-fraud-detection-api:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
