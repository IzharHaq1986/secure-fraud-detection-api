name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Keep permissions explicit and minimal.
# - contents:read is sufficient for repository checkout
# - security-events:write is required to upload SARIF results
permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Unit tests + coverage gate
    runs-on: ubuntu-latest

    steps:
      # Fetch repository content for the workflow run
      - name: Checkout
        uses: actions/checkout@v4

      # Use a consistent Python version in CI
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip downloads to speed up repeated CI runs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install application + test dependencies
      # CI should not rely on local developer environment state
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # Install application dependencies if present
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

          # Install dev/test dependencies if present (common filenames supported)
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f dev-requirements.txt ]; then pip install -r dev-requirements.txt; fi

          # Ensure test tooling exists even if not listed in requirements files
          # httpx is required by starlette.testclient in many FastAPI test suites
          pip install pytest pytest-cov httpx

      # Run tests with coverage and enforce the minimum threshold
      # --cov-config points to .coveragerc (repo root) for omit/source rules
      - name: Run pytest with coverage gate
        run: |
          pytest \
            --maxfail=1 \
            --disable-warnings \
            --cov \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            --cov-config=.coveragerc

  vuln_scan:
    name: Container vulnerability scan (Trivy)
    runs-on: ubuntu-latest

    # Run only after the test job succeeds
    needs:
      - test

    steps:
      # Fetch repository content for Docker build context
      - name: Checkout
        uses: actions/checkout@v4

      # Confirm the Dockerfile exists in the runner workspace
      # This protects against misconfigured checkout paths or unexpected working directories
      - name: Verify Dockerfile exists
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE"
          test -f "$GITHUB_WORKSPACE/Dockerfile"

      # Build the container image using the workspace as the build context
      # Using absolute paths avoids "Dockerfile not found" errors
      - name: Build Docker image
        run: |
          docker build \
            --file "$GITHUB_WORKSPACE/Dockerfile" \
            --tag secure-fraud-detection-api:ci \
            "$GITHUB_WORKSPACE"

      # Generate a SARIF report so findings can appear in GitHub Security
      - name: Trivy scan (SARIF export)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secure-fraud-detection-api:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      # Upload SARIF results to GitHub Security → Code scanning alerts
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # Fail the job if CRITICAL vulnerabilities are detected
      # ignore-unfixed:true avoids failing on issues without an available fix
      - name: Fail on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secure-fraud-detection-api:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
